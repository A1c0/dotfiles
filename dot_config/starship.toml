[git_status]
disabled = true

[custom.git_status]
when = "jj --ignore-working-copy root | complete | if ($in.exit_code == 0) {error make}" # Slow without `require_repo = true`
require_repo = true # Avoids `when` eval overhead in plain dirs
command = "starship module git_status"
style = "" # This disables the default "(bold green)" style
description = "Only show git_status if we're not in a jj repo"

[git_commit]
